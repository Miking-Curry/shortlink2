spring:
  cloud:
    gateway:
      routes:
        - id: short-link-admin-aggregation
          uri: lb://short-link-aggregation
          predicates:
            - Path=/api/short-link/admin/**
          filters:
            - name: TokenValidate
              args:
                whitePathList:
                  - /api/short-link/admin/v1/user/login
                  - /api/short-link/admin/v1/user/has-username

        - id: short-link-project-aggregation
          uri: lb://short-link-aggregation
          predicates:
            - Path=/api/short-link/**
          filters:
            - name: TokenValidate

        - id: short-link-restore-aggregation
          uri: lb://short-link-aggregation  # 转发给聚合服务
          predicates:
            - Path=/{short-uri}